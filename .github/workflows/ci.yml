name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ============================================
  # Build shared package first (dependency for others)
  # ============================================
  shared:
    name: Build Shared Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared
        run: pnpm --filter @guesthouse/shared typecheck

      - name: Build shared
        run: pnpm --filter @guesthouse/shared build

      - name: Upload shared build
        uses: actions/upload-artifact@v4
        with:
          name: shared-dist
          path: packages/shared/dist
          retention-days: 1

  # ============================================
  # Backend: Typecheck, Test, Build
  # ============================================
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: shared
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared build
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: packages/shared/dist

      - name: Typecheck backend
        run: pnpm --filter backend typecheck
        continue-on-error: true

      - name: Run backend tests
        run: pnpm --filter backend test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/guesthouse_test
          JWT_ACCESS_SECRET: test-access-secret-at-least-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-characters

      - name: Build backend
        run: pnpm --filter backend build

  # ============================================
  # Frontend: Typecheck, Lint, Build
  # ============================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared build
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: packages/shared/dist

      - name: Typecheck frontend
        run: pnpm --filter frontend typecheck
        continue-on-error: true

      - name: Lint frontend
        run: pnpm --filter frontend lint
        continue-on-error: true

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ============================================
  # Docker Build (optional, only on main)
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: guesthouse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: guesthouse-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
